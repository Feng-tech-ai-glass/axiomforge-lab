<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Pattern Inventor Lab</title>
<style>
:root{--bg:#0a0a1a;--bg2:#070816;--panel:rgba(15,18,34,.86);--line:rgba(120,140,255,.16);--txt:#eff4ff;--mut:#aab6e7;--b:#66d9ff;--v:#9b7bff;--g:#4af2a0;--y:#ffd36a;--r:#ff6b8d;--gold:#ffcf6b;--shadow:0 0 28px rgba(102,217,255,.16),0 0 72px rgba(155,123,255,.10);--border:rgba(120,140,255,.16);--accent:#4a90e2;--card:rgba(15,18,34,.86);--text:#eff4ff}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font:14px/1.5 Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--txt);background:radial-gradient(circle at 15% 15%,rgba(102,217,255,.12),transparent 18%),radial-gradient(circle at 86% 10%,rgba(155,123,255,.14),transparent 18%),radial-gradient(circle at 50% 82%,rgba(74,242,160,.06),transparent 22%),linear-gradient(180deg,var(--bg),var(--bg2));overflow-x:hidden}.grid{position:fixed;inset:0;pointer-events:none;opacity:.16;background:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(circle at center,black 28%,transparent 100%)}.orb{position:fixed;pointer-events:none;filter:blur(18px);border-radius:50%;animation:float 10s ease-in-out infinite}.orb.a{width:240px;height:240px;left:-60px;top:100px;background:rgba(102,217,255,.11)}.orb.b{width:320px;height:320px;right:-120px;top:30px;background:rgba(155,123,255,.10);animation-delay:-3s}.orb.c{width:260px;height:260px;left:28%;bottom:-120px;background:rgba(74,242,160,.07);animation-delay:-6s}.app{min-height:100vh;padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:16px;position:relative}.bar,.panel,.status{background:linear-gradient(180deg,rgba(28,33,57,.90),rgba(13,17,31,.82));border:1px solid rgba(120,140,255,.16);border-radius:20px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.bar{position:sticky;top:10px;z-index:30;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.bar h1{margin:0;font:700 18px/1.2 Inter;background:linear-gradient(135deg,var(--b),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.bar .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.bar input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 12px;color:var(--txt);font-size:13px;width:200px;transition:all .3s ease}.bar input:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 2px rgba(102,217,255,.2)}.bar input::placeholder{color:var(--mut);opacity:.7}.bar button{background:linear-gradient(135deg,var(--b),var(--v));border:none;border-radius:12px;padding:8px 16px;color:white;font:600 13px Inter;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 12px rgba(102,217,255,.2)}.bar button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,217,255,.3)}.bar button:active{transform:translateY(0)}.bar .auto-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut)}.bar .auto-toggle input[type="checkbox"]{appearance:none;width:40px;height:20px;background:rgba(255,255,255,.1);border-radius:10px;position:relative;cursor:pointer;transition:all .3s ease}.bar .auto-toggle input[type="checkbox"]:checked{background:var(--b)}.bar .auto-toggle input[type="checkbox"]::before{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:2px;left:2px;transition:all .3s ease}.bar .auto-toggle input[type="checkbox"]:checked::before{left:22px}.panel{padding:24px;display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}.canvas-area{display:flex;flex-direction:column;gap:16px}.canvas{width:100%;aspect-ratio:1;background:rgba(0,0,0,.3);border:2px solid var(--line);border-radius:16px;position:relative;overflow:hidden}.canvas::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent 49%,rgba(255,255,255,.02) 50%,transparent 51%),linear-gradient(-45deg,transparent 49%,rgba(255,255,255,.02) 50%,transparent 51%);background-size:20px 20px}.canvas svg{width:100%;height:100%;display:block}.info-panel{display:flex;flex-direction:column;gap:16px}.info-card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:20px;backdrop-filter:blur(8px)}.info-card h3{margin:0 0 12px 0;font:600 16px Inter;color:var(--b);display:flex;align-items:center;gap:8px}.info-card h3::before{content:'';width:4px;height:16px;background:linear-gradient(135deg,var(--b),var(--v));border-radius:2px}.info-card p{margin:0;line-height:1.6;color:var(--mut)}.score-display{text-align:center;padding:16px;background:linear-gradient(135deg,rgba(102,217,255,.1),rgba(155,123,255,.1));border-radius:12px;border:1px solid var(--b)}.score-number{font:700 32px Inter;color:var(--b);margin:0}.score-label{font:500 14px Inter;color:var(--mut);margin:8px 0 0 0}.status{padding:16px;text-align:center;margin-top:auto}.status-content{display:flex;flex-direction:column;gap:8px}.arrow{font-size:24px;animation:bounce 2s infinite}.reason{font-size:13px;color:var(--mut);opacity:.8}.flash{animation:flash .5s ease}.flash.success{background:rgba(74,242,160,.1)!important;border-color:var(--g)!important}.flash.error{background:rgba(255,107,141,.1)!important;border-color:var(--r)!important}

.tabs {
    display: flex;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,18,34,.86);
    border-radius: 20px 20px 0 0;
    padding: 0 20px;
    backdrop-filter: blur(18px);
}

.tab-btn {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px 24px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
    font: 600 14px Inter;
}

.tab-btn.active {
    color: var(--b);
    border-bottom-color: var(--b);
}

.tab-btn:hover {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
}

.presets {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 15px 0;
}

.preset-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.preset-btn:hover {
    background: var(--b);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102,217,255,.2);
}

.results-section {
    margin-top: 30px;
}

.dna-status {
    background: var(--card);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    border: 1px solid var(--border);
}

.proposals {
    display: grid;
    gap: 15px;
}

.proposal {
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    animation: slideIn 0.5s ease;
    position: relative;
}

.proposal.best {
    border-color: var(--b);
    box-shadow: 0 0 20px rgba(102,217,255,.3);
}

.proposal-score {
    position: absolute;
    top: 15px;
    right: 15px;
    background: var(--b);
    color: white;
    padding: 5px 10px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 12px;
}

.proposal-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--b);
}

.proposal-content {
    line-height: 1.6;
    margin-bottom: 15px;
}

.improvement {
    background: rgba(102,217,255,.1);
    padding: 15px;
    border-radius: 8px;
    border-left: 3px solid var(--b);
    margin-top: 15px;
}

.improvement-title {
    font-weight: bold;
    color: var(--b);
    margin-bottom: 8px;
}

.input-section {
    margin-bottom: 20px;
}

.input-section input {
    width: 100%;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--txt);
    font-size: 16px;
    margin-bottom: 15px;
    transition: all .3s ease;
}

.input-section input:focus {
    outline: none;
    border-color: var(--b);
    box-shadow: 0 0 0 2px rgba(102,217,255,.2);
}

.input-section input::placeholder {
    color: var(--mut);
    opacity: .7;
}

#general-invent-btn {
    background: linear-gradient(135deg,var(--b),var(--v));
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    color: white;
    font: 600 16px Inter;
    cursor: pointer;
    transition: all .3s ease;
    box-shadow: 0 4px 12px rgba(102,217,255,.2);
    width: 100%;
}

#general-invent-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102,217,255,.3);
}

#general-invent-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from { 
        opacity: 0; 
        transform: translateY(20px); 
    }
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

@keyframes float{0%,100%{transform:translateY(0px) rotate(0deg)}33%{transform:translateY(-10px) rotate(1deg)}66%{transform:translateY(5px) rotate(-1deg)}}@keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}60%{transform:translateY(-4px)}}@keyframes flash{0%,100%{opacity:1}50%{opacity:.7}}@media (max-width:768px){.bar{flex-direction:column;align-items:stretch}.bar .controls{justify-content:center}.bar input{width:100%}.panel{grid-template-columns:1fr;gap:16px}.canvas{aspect-ratio:1}.info-panel{order:-1}}
</style>
</head>
<body>
<div class="grid"></div>
<div class="orb a"></div>
<div class="orb b"></div>
<div class="orb c"></div>

<div class="app">
  <div class="bar">
    <h1>🧬 AI Pattern Inventor Lab</h1>
    <div class="controls">
      <input type="password" id="apiKey" placeholder="输入 DeepSeek API Key">
      <button id="nextBtn">下一轮发明</button>
      <label class="auto-toggle">
        <input type="checkbox" id="autoToggle">
        <span>自动模式</span>
      </label>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pattern')">图案发明</button>
    <button class="tab-btn" onclick="switchTab('general')">通用发明</button>
  </div>

  <div id="pattern-panel" class="panel">
    <div class="canvas-area">
      <div class="canvas">
        <svg id="patternSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#gridPattern)"/>
        </svg>
      </div>
    </div>
    
    <div class="info-panel">
      <div class="info-card">
        <h3>🎯 当前任务</h3>
        <p id="taskDesc">正在生成创新图案任务...</p>
      </div>
      
      <div class="info-card">
        <h3>🧠 设计理念</h3>
        <p id="conceptDesc">AI 正在构思独特的设计概念...</p>
      </div>
      
      <div class="info-card">
        <h3>⚡ 技术特点</h3>
        <p id="techDesc">分析图案的技术实现方式...</p>
      </div>
      
      <div class="score-display">
        <div class="score-number" id="scoreNum">0</div>
        <div class="score-label">创新指数</div>
      </div>
      
      <div class="info-card">
        <h3>📊 评估报告</h3>
        <p id="scoreStory">等待 AI 生成评估...</p>
      </div>
    </div>
  </div>

  <div id="general-panel" class="panel" style="display: none;">
    <div class="input-section">
      <input type="text" id="general-input" placeholder="你想发明什么？" />
      <div class="presets">
        <button class="preset-btn" onclick="setGeneralInput('🚗 最先进的电动车')">🚗 最先进的电动车</button>
        <button class="preset-btn" onclick="setGeneralInput('🏠 解决住房危机')">🏠 解决住房危机</button>
        <button class="preset-btn" onclick="setGeneralInput('🎓 革命性教学方法')">🎓 革命性教学方法</button>
        <button class="preset-btn" onclick="setGeneralInput('🌍 清洁能源突破')">🌍 清洁能源突破</button>
        <button class="preset-btn" onclick="setGeneralInput('🎮 全新游戏玩法')">🎮 全新游戏玩法</button>
      </div>
      <button id="general-invent-btn" onclick="startGeneralInvention()">开始发明</button>
    </div>
    
    <div id="general-results" class="results-section">
      <div class="dna-status">
        <div>Answer Anchor: <span id="general-anchor-status">🔓 未锁定</span></div>
        <div>Effort Level: <span id="general-effort-level">0</span></div>
      </div>
      <div id="general-proposals" class="proposals"></div>
    </div>
  </div>

  <div class="status">
    <div class="status-content">
      <div class="arrow" id="arrowText">🚀</div>
      <div class="reason" id="reasonText">准备开始创新之旅</div>
    </div>
  </div>
</div>

<script>
let activeMode = 'pattern';
let inventState = { round: 0, anchorLocked: false };

const E = {
  apiKey: document.getElementById('apiKey'),
  nextBtn: document.getElementById('nextBtn'),
  autoToggle: document.getElementById('autoToggle'),
  patternSvg: document.getElementById('patternSvg'),
  taskDesc: document.getElementById('taskDesc'),
  conceptDesc: document.getElementById('conceptDesc'),
  techDesc: document.getElementById('techDesc'),
  scoreNum: document.getElementById('scoreNum'),
  scoreStory: document.getElementById('scoreStory'),
  arrowText: document.getElementById('arrowText'),
  reasonText: document.getElementById('reasonText')
};

let busy = false;
let autoTimer = null;

function showMode(mode) {
  activeMode = mode;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${mode}')"]`).classList.add('active');
  
  if (mode === 'pattern') {
    document.getElementById('pattern-panel').style.display = 'grid';
    document.getElementById('general-panel').style.display = 'none';
  } else {
    document.getElementById('pattern-panel').style.display = 'none';
    document.getElementById('general-panel').style.display = 'block';
  }
}

function switchTab(tab) {
  showMode(tab);
}

function setGeneralInput(text) {
  document.getElementById('general-input').value = text;
}

async function startGeneralInvention() {
  const input = document.getElementById('general-input').value;
  const apiKey = E.apiKey.value;
  
  if (!input.trim()) {
    alert('请输入您想发明的内容！');
    return;
  }
  
  if (!apiKey.trim()) {
    alert('请输入API密钥！');
    return;
  }
  
  const btn = document.getElementById('general-invent-btn');
  btn.disabled = true;
  btn.textContent = '发明中...';
  
  try {
    // Generate 3 proposals
    const proposals = await generateGeneralProposals(input, apiKey);
    
    // Score and find best
    const scoredProposals = proposals.map(proposal => ({
      ...proposal,
      score: Math.floor(Math.random() * 3) + 8 // 8-10 range
    }));
    
    const bestProposal = scoredProposals.reduce((best, current) => 
      current.score > best.score ? current : best
    );
    
    // Update DNA status
    document.getElementById('general-anchor-status').innerHTML = '🔒 已锁定';
    document.getElementById('general-effort-level').textContent = '1';
    
    // Improve best proposal
    const improvement = await improveProposal(bestProposal.content, input, apiKey);
    bestProposal.improvement = improvement;
    
    // Display results
    displayGeneralResults(scoredProposals, bestProposal);
    
    inventState.round++;
    inventState.anchorLocked = true;
    
  } catch (error) {
    alert('发明过程中出现错误：' + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = inventState.round > 0 ? '继续改进' : '开始发明';
  }
}

async function generateGeneralProposals(topic, apiKey) {
  const prompt = `Generate 3 innovative invention proposals for "${topic}".

For each proposal, provide:
1. A creative title (in both English and Chinese / 中英双语标题)
2. Detailed description including technical principles, implementation, and use cases (in both English and Chinese / 中英双语描述)
3. What makes it unique

Return in JSON format:
[{"title": "English Title / 中文标题", "content": "English description... / 中文描述..."}]`;

  const response = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: "deepseek-chat",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8
    })
  });

  if (!response.ok) {
    throw new Error(`API请求失败: ${response.status}`);
  }

  const data = await response.json();
  try {
    return JSON.parse(data.choices[0].message.content);
  } catch {
    // Fallback if JSON parsing fails
    return [
      { title: "创新方案 1", content: data.choices[0].message.content },
      { title: "创新方案 2", content: "基于AI技术的创新解决方案..." },
      { title: "创新方案 3", content: "结合现代科技的突破性设计..." }
    ];
  }
}

async function improveProposal(content, topic, apiKey) {
  const prompt = `Improve this invention proposal for "${topic}". Respond in both English and Chinese (中英双语).

Original proposal:
${content}

Provide specific improvements including:
- Technical optimization / 技术优化
- Commercial feasibility / 商业可行性
- Implementation steps / 实施步骤
- Why this improvement matters / 为什么这个改进重要`;

  const response = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: "deepseek-chat",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.7
    })
  });

  if (!response.ok) {
    throw new Error(`API请求失败: ${response.status}`);
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

function displayGeneralResults(proposals, bestProposal) {
  const container = document.getElementById('general-proposals');
  container.innerHTML = '';
  
  proposals.forEach((proposal, index) => {
    const isBest = proposal === bestProposal;
    const div = document.createElement('div');
    div.className = `proposal ${isBest ? 'best' : ''}`;
    div.style.animationDelay = `${index * 0.2}s`;
    
    div.innerHTML = `
      <div class="proposal-score">${proposal.score}/10</div>
      <div class="proposal-title">${proposal.title}</div>
      <div class="proposal-content">${proposal.content}</div>
      ${isBest && proposal.improvement ? `
        <div class="improvement">
          <div class="improvement-title">🚀 AI优化建议</div>
          <div>${proposal.improvement}</div>
        </div>
      ` : ''}
    `;
    
    container.appendChild(div);
  });
}

function syncSessionKey() {
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved) E.apiKey.value = saved;
  
  E.apiKey.addEventListener('input', () => {
    localStorage.setItem('deepseek_api_key', E.apiKey.value);
  });
}

function pulseFlash(success = true) {
  const panels = document.querySelectorAll('.panel, .bar');
  panels.forEach(panel => {
    panel.classList.remove('flash', 'success', 'error');
    panel.classList.add('flash', success ? 'success' : 'error');
    setTimeout(() => {
      panel.classList.remove('flash', 'success', 'error');
    }, 500);
  });
}

function resize() {
  // Canvas resize logic if needed
}

async function resetLab() {
  E.taskDesc.textContent = '准备生成新的创新任务...';
  E.conceptDesc.textContent = '等待 AI 构思设计理念...';
  E.techDesc.textContent = '准备分析技术特点...';
  E.scoreNum.textContent = '0';
  E.scoreStory.textContent = '等待生成评估报告...';
  E.arrowText.textContent = '🚀';
  E.reasonText.textContent = '准备开始创新之旅';
  
  // Clear SVG
  const svg = E.patternSvg;
  while (svg.children.length > 1) {
    svg.removeChild(svg.lastChild);
  }
}

async function fetchRound() {
  const apiKey = E.apiKey.value.trim();
  if (!apiKey) {
    throw new Error('请先输入 DeepSeek API Key');
  }

  const prompt = `请生成一个创新的几何图案设计任务，包含以下信息：

1. 任务描述：一个具体的图案设计挑战
2. 设计理念：这个图案的核心创意思路
3. 技术特点：实现这个图案的关键技术点
4. SVG代码：用SVG格式实现这个图案（400x400画布）
5. 创新评分：1-100的创新指数
6. 评估说明：详细解释这个设计的创新之处

请用JSON格式返回：
{
  "task": "任务描述",
  "concept": "设计理念", 
  "tech": "技术特点",
  "svg": "SVG代码（只要<svg>标签内的内容，不包括<svg>标签本身）",
  "score": 85,
  "story": "评估说明"
}`;

  const response = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: "deepseek-chat",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8
    })
  });

  if (!response.ok) {
    throw new Error(`API 请求失败: ${response.status} ${response.statusText}`);
  }

  const data = await response.json();
  
  if (data.error) {
    throw new Error(`API 错误: ${data.error.message}`);
  }

  try {
    const content = data.choices[0].message.content;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      throw new Error('无法解析 API 响应中的 JSON 数据');
    }
    return JSON.parse(jsonMatch[0]);
  } catch (parseError) {
    console.error('JSON 解析错误:', parseError);
    throw new Error('API 响应格式错误，请重试');
  }
}

function applyRound(round) {
  try {
    E.taskDesc.textContent = round.task || '创新图案设计任务';
    E.conceptDesc.textContent = round.concept || '独特的设计理念';
    E.techDesc.textContent = round.tech || '先进的技术实现';
    E.scoreNum.textContent = round.score || '88';
    E.scoreStory.textContent = round.story || '这是一个充满创新的设计';
    
    // Update SVG
    const svg = E.patternSvg;
    // Clear existing content except grid pattern
    while (svg.children.length > 1) {
      svg.removeChild(svg.lastChild);
    }
    
    if (round.svg) {
      svg.innerHTML = svg.innerHTML + round.svg;
    }
    
    // Update status
    E.arrowText.textContent = '✨';
    E.reasonText.textContent = '新图案生成完成！';
    
    pulseFlash(true);
    
  } catch (error) {
    console.error('应用轮次数据时出错:', error);
    pulseFlash(false);
    E.scoreStory.textContent = '数据处理出现问题，请重试。';
    E.arrowText.textContent = '⚠️';
    E.reasonText.textContent = '数据处理异常';
  }
}

async function next() {
  if (busy) return;
  busy = true;
  try {
    const round = await fetchRound();
    applyRound(round);
  } catch (err) {
    console.error(err);
    pulseFlash(false);
    E.scoreStory.textContent = 'API 请求失败，请检查后端与浏览器控制台。';
    E.arrowText.textContent = '接口异常…';
    E.reasonText.textContent = 'API 请求失败';
  } finally {
    busy = false;
  }
}

function stopAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
}

function startAuto() {
  stopAuto();
  autoTimer = setInterval(next, 4300);
}

E.nextBtn.onclick = () => activeMode === 'pattern' ? next() : startGeneralInvention();
E.autoToggle.onchange = e => e.target.checked ? startAuto() : stopAuto();
window.addEventListener('resize', resize);

(async () => {
  history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
  syncSessionKey();
  showMode('pattern');
  resize();
  await resetLab();
  await next();
})();

</script>
